name: Download Real 3D Assets (Fixed)

on:
  workflow_dispatch:

jobs:
  download-verified-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Clean corrupt files
      run: |
        rm -f app/src/main/assets/models/cars/*.glb || true
        rm -f app/src/main/assets/models/tracks/*.glb || true
        rm -f app/src/main/assets/textures/*.png || true
        rm -f app/src/main/assets/textures/*.jpg || true
        mkdir -p app/src/main/assets/models/cars
        mkdir -p app/src/main/assets/models/tracks
        mkdir -p app/src/main/assets/textures/cars
        mkdir -p app/src/main/assets/textures/tracks
    
    - name: Setup Python for validation
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install validation tools
      run: pip install requests
    
    - name: Download verified glTF models
      run: |
        cd app/src/main/assets/models/cars
        
        echo "Downloading Car 1..."
        curl -L -f -o car1.glb \
          "https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/BoxAnimated/glTF-Binary/BoxAnimated.glb" \
          && echo "✓ Car 1 downloaded" || echo "✗ Car 1 failed"
        
        echo "Downloading Car 2..."
        curl -L -f -o car2.glb \
          "https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/CesiumMilkTruck/glTF-Binary/CesiumMilkTruck.glb" \
          && echo "✓ Car 2 downloaded" || echo "✗ Car 2 failed"
        
        echo "Downloading Car 3..."
        curl -L -f -o car3.glb \
          "https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF-Binary/Duck.glb" \
          && echo "✓ Car 3 downloaded" || echo "✗ Car 3 failed"
        
        echo "Downloading Car 4..."
        curl -L -f -o car4.glb \
          "https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/DamagedHelmet/glTF-Binary/DamagedHelmet.glb" \
          && echo "✓ Car 4 downloaded" || echo "✗ Car 4 failed"
    
    - name: Download track environment models
      run: |
        cd app/src/main/assets/models/tracks
        
        curl -L -f -o barrier.glb \
          "https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Box/glTF-Binary/Box.glb" \
          && echo "✓ Barrier downloaded" || echo "✗ Barrier failed"
        
        curl -L -f -o tree.glb \
          "https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/BrainStem/glTF-Binary/BrainStem.glb" \
          && echo "✓ Tree downloaded" || echo "✗ Tree failed"
    
    - name: Download real textures
      run: |
        cd app/src/main/assets/textures/cars
        
        curl -L -f -o metal.jpg \
          "https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/uv_grid_opengl.jpg" \
          && echo "✓ Metal texture downloaded" || echo "✗ Metal texture failed"
        
        curl -L -f -o paint.png \
          "https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/checker.png" \
          && echo "✓ Paint texture downloaded" || echo "✗ Paint texture failed"
        
        cd ../tracks
        
        curl -L -f -o asphalt.jpg \
          "https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/terrain/grasslight-big.jpg" \
          && echo "✓ Asphalt texture downloaded" || echo "✗ Asphalt texture failed"
    
    - name: Validate downloaded files
      run: |
        python3 << 'VALIDATE_SCRIPT'
        import os
        import sys
        from pathlib import Path
        
        def validate_glb(filepath):
            if not filepath.exists():
                return False, "File does not exist"
            
            if filepath.stat().st_size == 0:
                return False, "File is empty (0 bytes)"
            
            if filepath.stat().st_size < 100:
                return False, f"File too small ({filepath.stat().st_size} bytes)"
            
            with open(filepath, 'rb') as f:
                magic = f.read(4)
                if magic == b'glTF':
                    return True, f"Valid glTF ({filepath.stat().st_size} bytes)"
                elif magic.startswith(b'<!DO') or magic.startswith(b'<htm'):
                    return False, "File contains HTML (download failed)"
                else:
                    return False, f"Invalid magic number: {magic.hex()}"
        
        def validate_image(filepath):
            if not filepath.exists():
                return False, "File does not exist"
            
            if filepath.stat().st_size == 0:
                return False, "File is empty"
            
            if filepath.stat().st_size < 100:
                return False, f"File too small ({filepath.stat().st_size} bytes)"
            
            with open(filepath, 'rb') as f:
                header = f.read(8)
                if header[:4] == b'\x89PNG':
                    return True, f"Valid PNG ({filepath.stat().st_size} bytes)"
                elif header[:2] == b'\xff\xd8':
                    return True, f"Valid JPEG ({filepath.stat().st_size} bytes)"
                elif header.startswith(b'<!DO') or header.startswith(b'<htm'):
                    return False, "File contains HTML (download failed)"
                else:
                    return False, "Unknown image format"
        
        print("\n=== VALIDATING DOWNLOADED ASSETS ===")
        print("\n--- CAR MODELS ---")
        
        cars_dir = Path("app/src/main/assets/models/cars")
        valid_cars = 0
        for glb_file in sorted(cars_dir.glob("*.glb")):
            is_valid, msg = validate_glb(glb_file)
            status = "✓" if is_valid else "✗"
            print(f"{status} {glb_file.name}: {msg}")
            if is_valid:
                valid_cars += 1
            else:
                glb_file.unlink()
                print(f"  Deleted corrupt file: {glb_file.name}")
        
        print("\n--- TRACK MODELS ---")
        tracks_dir = Path("app/src/main/assets/models/tracks")
        valid_tracks = 0
        for glb_file in sorted(tracks_dir.glob("*.glb")):
            is_valid, msg = validate_glb(glb_file)
            status = "✓" if is_valid else "✗"
            print(f"{status} {glb_file.name}: {msg}")
            if is_valid:
                valid_tracks += 1
            else:
                glb_file.unlink()
                print(f"  Deleted corrupt file: {glb_file.name}")
        
        print("\n--- TEXTURES ---")
        textures_base = Path("app/src/main/assets/textures")
        valid_textures = 0
        for img_file in sorted(textures_base.rglob("*.jpg")) + sorted(textures_base.rglob("*.png")):
            is_valid, msg = validate_image(img_file)
            status = "✓" if is_valid else "✗"
            print(f"{status} {img_file.name}: {msg}")
            if is_valid:
                valid_textures += 1
            else:
                img_file.unlink()
                print(f"  Deleted corrupt file: {img_file.name}")
        
        print("\n=== VALIDATION SUMMARY ===")
        print(f"Valid car models: {valid_cars}")
        print(f"Valid track models: {valid_tracks}")
        print(f"Valid textures: {valid_textures}")
        print(f"Total valid assets: {valid_cars + valid_tracks + valid_textures}")
        
        if valid_cars == 0 and valid_tracks == 0 and valid_textures == 0:
            print("\n⚠️  NO VALID ASSETS DOWNLOADED!")
            sys.exit(1)
        
        print("\n✓ Validation complete!")
        VALIDATE_SCRIPT
    
    - name: Commit validated assets
      run: |
        git config user.name "Asset Validator Bot"
        git config user.email "validator@github-actions.bot"
        git add app/src/main/assets/
        
        if git diff --staged --quiet; then
          echo "No valid assets to commit"
        else
          git commit -m "✅ Add validated 3D assets (glTF format verified)
          
          - Downloaded and validated car models
          - Added track environment assets
          - Included textures
          - All files checked for proper glTF/image format
          - Removed HTML/corrupt files"
          git push
        fi
    
    - name: Generate download report
      run: |
        echo "# Asset Download Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## ✅ Successfully Downloaded Assets" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Car Models" >> $GITHUB_STEP_SUMMARY
        ls -lh app/src/main/assets/models/cars/*.glb 2>/dev/null | awk '{print "- " $9 " (" $5 ")"}' >> $GITHUB_STEP_SUMMARY || echo "No car models downloaded" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Track Models" >> $GITHUB_STEP_SUMMARY
        ls -lh app/src/main/assets/models/tracks/*.glb 2>/dev/null | awk '{print "- " $9 " (" $5 ")"}' >> $GITHUB_STEP_SUMMARY || echo "No track models downloaded" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Textures" >> $GITHUB_STEP_SUMMARY
        find app/src/main/assets/textures -type f 2>/dev/null | wc -l | awk '{print $1 " texture files"}' >> $GITHUB_STEP_SUMMARY