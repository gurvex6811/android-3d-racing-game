name: Android CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install Android NDK
      run: |
        echo "Installing Android NDK..."
        sdkmanager --install "ndk;26.1.10909125" "cmake;3.22.1"
        echo "NDK installed successfully"
        
    - name: Set NDK environment
      run: |
        echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV
        echo "ANDROID_NDK=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV
    
    - name: Download Gradle wrapper JAR
      run: |
        mkdir -p gradle/wrapper
        curl -L -o gradle/wrapper/gradle-wrapper.jar \
          https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar
    
    - name: Make gradlew executable
      run: chmod +x gradlew
      
    - name: Validate Gradle wrapper
      uses: gradle/wrapper-validation-action@v2
      
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Build debug APK
      run: |
        echo "Building APK with NDK support..."
        ./gradlew assembleDebug --stacktrace --info
      
    - name: Verify APK exists
      run: |
        echo "Checking for APK files..."
        find app/build/outputs -name "*.apk" -type f || echo "No APK found"
        ls -lh app/build/outputs/apk/debug/ || echo "Debug directory not found"
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: racing-game-debug-apk
        path: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/debug/output-metadata.json
        if-no-files-found: warn
        retention-days: 30
    
    - name: Run unit tests
      run: ./gradlew test --stacktrace
      continue-on-error: true
      
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: app/build/test-results/
        if-no-files-found: ignore
    
    - name: Build summary
      if: always()
      run: |
        echo "# 🏗️ Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        echo "## Environment" >> $GITHUB_STEP_SUMMARY
        echo "- **JDK:** $(java -version 2>&1 | head -n 1)" >> $GITHUB_STEP_SUMMARY
        echo "- **Gradle:** $(./gradlew --version | grep Gradle)" >> $GITHUB_STEP_SUMMARY
        echo "- **NDK:** ${ANDROID_NDK_HOME}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        echo "## Build Outputs" >> $GITHUB_STEP_SUMMARY
        if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
          APK_SIZE=$(ls -lh app/build/outputs/apk/debug/app-debug.apk | awk '{print $5}')
          echo "✅ **APK Built Successfully**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **File:** \`app-debug.apk\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Size:** ${APK_SIZE}" >> $GITHUB_STEP_SUMMARY
          echo "- **Download:** Check artifacts above ⬆️" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **APK Build Failed**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the build logs for errors." >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Native Libraries" >> $GITHUB_STEP_SUMMARY
        if [ -d "app/build/intermediates/merged_native_libs" ]; then
          find app/build/intermediates/merged_native_libs -name "*.so" | while read lib; do
            echo "- \`$(basename $lib)\`" >> $GITHUB_STEP_SUMMARY
          done
        else
          echo "No native libraries found" >> $GITHUB_STEP_SUMMARY
        fi