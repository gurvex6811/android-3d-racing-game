name: Android CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Accept Android SDK licenses
      run: yes | sdkmanager --licenses || true
    
    - name: Install Android NDK and CMake
      run: |
        echo "Installing Android NDK and CMake..."
        sdkmanager --install "ndk;26.1.10909125" "cmake;3.22.1" "build-tools;34.0.0"
        echo "NDK and CMake installed successfully"
        
    - name: Set NDK environment variables
      run: |
        echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV
        echo "ANDROID_NDK=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV
        echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV
    
    - name: Download Gradle wrapper JAR
      run: |
        mkdir -p gradle/wrapper
        curl -L -o gradle/wrapper/gradle-wrapper.jar \
          https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar
    
    - name: Make gradlew executable
      run: chmod +x gradlew
      
    - name: Validate Gradle wrapper
      uses: gradle/wrapper-validation-action@v2
      
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Display build environment
      run: |
        echo "=== Build Environment ==="
        echo "Java version:"
        java -version
        echo ""
        echo "Gradle version:"
        ./gradlew --version
        echo ""
        echo "NDK location: ${ANDROID_NDK_HOME}"
        ls -la ${ANDROID_NDK_HOME} 2>/dev/null || echo "NDK not found at expected location"
        echo ""
        echo "CMake location:"
        find $ANDROID_SDK_ROOT -name cmake -type f 2>/dev/null | head -5
    
    - name: Build debug APK
      run: |
        echo "Building APK with NDK support..."
        ./gradlew assembleDebug --stacktrace --info --warning-mode all
      
    - name: Verify APK exists
      run: |
        echo "Checking for APK files..."
        find app/build/outputs -name "*.apk" -type f -exec ls -lh {} \; || echo "No APK found"
        
        if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
          echo "✅ APK found!"
          ls -lh app/build/outputs/apk/debug/app-debug.apk
        else
          echo "❌ APK not found!"
          echo "Checking build outputs:"
          find app/build -type f -name "*.apk" -o -name "*.aab" 2>/dev/null
        fi
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: racing-game-debug-apk
        path: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/debug/output-metadata.json
        if-no-files-found: warn
        retention-days: 30
    
    - name: Upload native libraries
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: native-libraries
        path: |
          app/build/intermediates/merged_native_libs/**/*.so
        if-no-files-found: ignore
    
    - name: Run unit tests
      run: ./gradlew test --stacktrace
      continue-on-error: true
      
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          app/build/reports/tests/
          app/build/test-results/
        if-no-files-found: ignore
    
    - name: Build summary
      if: always()
      run: |
        echo "# 🏗️ Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        echo "## Environment" >> $GITHUB_STEP_SUMMARY
        echo "- **JDK:** $(java -version 2>&1 | head -n 1)" >> $GITHUB_STEP_SUMMARY
        echo "- **Gradle:** $(./gradlew --version | grep Gradle | head -n 1)" >> $GITHUB_STEP_SUMMARY
        echo "- **NDK:** ${ANDROID_NDK_HOME}" >> $GITHUB_STEP_SUMMARY
        echo "- **CMake:** $(find $ANDROID_SDK_ROOT/cmake -name cmake -type f 2>/dev/null | head -1 || echo 'Not found')" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        echo "## Build Outputs" >> $GITHUB_STEP_SUMMARY
        if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
          APK_SIZE=$(ls -lh app/build/outputs/apk/debug/app-debug.apk | awk '{print $5}')
          APK_SHA=$(sha256sum app/build/outputs/apk/debug/app-debug.apk | cut -d' ' -f1 | cut -c1-16)
          echo "✅ **APK Built Successfully**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| File | \`app-debug.apk\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Size | ${APK_SIZE} |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA256 | \`${APK_SHA}...\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Download | Check artifacts above ⬆️ |" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **APK Build Failed**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the build logs for errors." >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Native Libraries" >> $GITHUB_STEP_SUMMARY
        if find app/build -name "*.so" -type f 2>/dev/null | grep -q .; then
          find app/build -name "*.so" -type f 2>/dev/null | while read lib; do
            LIB_SIZE=$(ls -lh "$lib" | awk '{print $5}')
            LIB_NAME=$(basename "$lib")
            LIB_ARCH=$(echo "$lib" | grep -oP '(armeabi-v7a|arm64-v8a|x86|x86_64)' || echo 'unknown')
            echo "- \`${LIB_NAME}\` (${LIB_ARCH}) - ${LIB_SIZE}" >> $GITHUB_STEP_SUMMARY
          done
        else
          echo "⚠️ No native libraries found" >> $GITHUB_STEP_SUMMARY
        fi
